name: Release

on:
  push:
    tags:
      - v*.*.*

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUILD_SOURCEMAP_ENABLE: ${{ secrets.BUILD_SOURCEMAP_ENABLE }}

jobs:
  # ── Server binaries ──────────────────────────────────────────────────────────
  build-server:
    name: Build Server (${{ matrix.target }})
    if: vars.BUILD_SERVER_ENABLE != 'false'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
            bin: clawgoal-server-linux-amd64
          - target: linux-arm64
            os: ubuntu-latest
            bin: clawgoal-server-linux-arm64
          - target: mac-x64
            os: macos-latest
            bin: clawgoal-server-mac-x64
          - target: mac-arm64
            os: macos-latest
            bin: clawgoal-server-mac-arm64
          - target: win-x64
            os: windows-latest
            bin: clawgoal-server-win-x64.exe
          - target: win-arm64
            os: windows-11-arm
            bin: clawgoal-server-win-arm64.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Clone Pro Repo (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        env:
          GIT_USER: ${{ secrets.GIT_USER }}
          GIT_PASS: ${{ secrets.GIT_PASS }}
          GIT_HOST: ${{ secrets.GIT_HOST }}
          GIT_REPO_BASE: ${{ secrets.GIT_REPO_BASE }}
        run: |
          git clone -b main "https://${GIT_USER}:${GIT_PASS}@${GIT_HOST}/${GIT_REPO_BASE}/clawgoal-pro.git" code

      - name: Clone Pro Repo (Windows)
        if: runner.os == 'Windows'
        env:
          GIT_USER: ${{ secrets.GIT_USER }}
          GIT_PASS: ${{ secrets.GIT_PASS }}
          GIT_HOST: ${{ secrets.GIT_HOST }}
          GIT_REPO_BASE: ${{ secrets.GIT_REPO_BASE }}
        shell: pwsh
        run: |
          git clone -b main "https://${env:GIT_USER}:${env:GIT_PASS}@${env:GIT_HOST}/${env:GIT_REPO_BASE}/clawgoal-pro.git" code

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        working-directory: code
        run: pnpm install --no-frozen-lockfile

      - name: Build backend-claw
        working-directory: code
        run: pnpm --filter @clawgoal/backend-claw build

      - name: Set BUILD_ID (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: |
          BUILD_ID="${{ matrix.target }}"
          case "$BUILD_ID" in
            linux-x64) BUILD_ID="linux-amd64" ;;
            mac-x64)   BUILD_ID="darwin-amd64" ;;
            mac-arm64) BUILD_ID="darwin-arm64" ;;
          esac
          BUILD_ID="${BUILD_ID}-$(date +%Y%m%d-%H%M%S)-${RANDOM}"
          echo "BUILD_ID=${BUILD_ID}" >> $GITHUB_ENV

      - name: Set BUILD_ID (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $plat = switch ($target) {
            "win-x64"   { "windows-amd64" }
            "win-arm64" { "windows-arm64" }
          }
          $ts = Get-Date -Format 'yyyyMMdd-HHmmss'
          $rn = Get-Random -Minimum 10000 -Maximum 99999
          "BUILD_ID=${plat}-${ts}-${rn}" >> $env:GITHUB_ENV

      - name: Build UI
        working-directory: code
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          BUILD_HIDE_PRO: ${{ secrets.BUILD_HIDE_PRO }}
          BUILD_SOURCEMAP_ENABLE: ${{ secrets.BUILD_SOURCEMAP_ENABLE }}
        run: pnpm --filter @clawgoal/ui build

      - name: Upload Sourcemaps
        if: runner.os != 'Windows'
        working-directory: code
        env:
          GROW_URL: ${{ secrets.GROW_URL }}
          GROW_APP_NAME: ${{ github.event.repository.name }}
          GROW_ADMIN_API_TOKEN: ${{ secrets.GROW_ADMIN_API_TOKEN }}
        run: |
          echo "Uploading sourcemaps ..."
          find packages/ui/dist -name '*.map' | while read f; do
            echo "  uploading $f"
            RESP=$(curl -s -X POST "${GROW_URL}/api/admin/grow/buildUpload" \
              -H "Authorization: Bearer ${GROW_ADMIN_API_TOKEN}" \
              -F "appName=${GROW_APP_NAME}" \
              -F "buildId=${BUILD_ID}" \
              -F "file=@${f}" \
              -F "name=${f}")
            echo "  done"
          done
          echo "Sourcemap upload done."

      - name: Upload Sourcemaps (Windows)
        if: runner.os == 'Windows'
        working-directory: code
        shell: pwsh
        env:
          GROW_URL: ${{ secrets.GROW_URL }}
          GROW_APP_NAME: ${{ github.event.repository.name }}
          GROW_ADMIN_API_TOKEN: ${{ secrets.GROW_ADMIN_API_TOKEN }}
        run: |
          echo "Uploading sourcemaps ..."
          Get-ChildItem -Path packages/ui/dist -Filter *.map -Recurse | ForEach-Object {
            $f = $_.FullName
            echo "  uploading $f"
            $resp = curl -s -X POST "${env:GROW_URL}/api/admin/grow/buildUpload" `
              -H "Authorization: Bearer ${env:GROW_ADMIN_API_TOKEN}" `
              -F "appName=${env:GROW_APP_NAME}" `
              -F "buildId=${env:BUILD_ID}" `
              -F "file=@${f}" `
              -F "name=${f}"
            echo "  done"
          }
          echo "Sourcemap upload done."

      - name: Build Server Binary (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        working-directory: code
        env:
          BUILD_SOURCEMAP_ENABLE: ${{ secrets.BUILD_SOURCEMAP_ENABLE }}
        run: pnpm --filter @clawgoal/backend build ${{ matrix.target }}

      - name: Cert Prepare for Server (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.CORP_MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.CORP_MACOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "ERROR: CORP_MACOS_CERTIFICATE secret is not set."
            exit 1
          fi
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security unlock-keychain -p "" build.keychain
          # Get cert label and update partition list for codesign access
          CERT_LABEL=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | sed -n 's/.*"\(.*\)".*/\1/p')
          security set-key-partition-list -S apple-tool:,apple: -s -k "" -l "${CERT_LABEL}" -t private build.keychain
          # Export and trust
          security export -k build.keychain -t certs -f x509 -p -o certificate.cer
          sudo security add-trusted-cert -d -r trustRoot -k /Library/Keychains/System.keychain certificate.cer
          # Extract signing identity (SHA-1 hash) for codesign
          CERT_IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | awk '{print $2}')
          echo "CERT_IDENTITY=${CERT_IDENTITY}" >> $GITHUB_ENV

      - name: Sign Server Binary (macOS)
        if: runner.os == 'macOS'
        run: |
          codesign --deep --force --options runtime --timestamp \
            --sign "${{ env.CERT_IDENTITY }}" \
            --verbose \
            "code/packages/backend/dist/${{ matrix.bin }}"

      - name: Notarize Server Binary (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "WARNING: Apple ID secrets not set, skipping notarization."
            exit 0
          fi
          BINARY="code/packages/backend/dist/${{ matrix.bin }}"
          echo "Notarizing ${BINARY} ..."
          ditto -c -k "${BINARY}" "notarize.zip"
          xcrun notarytool submit "notarize.zip" \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --wait
          xcrun stapler staple "${BINARY}"
          spctl -a -t exec -vv "${BINARY}"
          echo "Notarization complete!"

      - name: Build Server Binary (Windows)
        if: runner.os == 'Windows'
        working-directory: code
        shell: pwsh
        env:
          BUILD_SOURCEMAP_ENABLE: ${{ secrets.BUILD_SOURCEMAP_ENABLE }}
        run: |
          $target = "${{ matrix.target }}"
          if ($target -eq "win-arm64" -and "${{ runner.arch }}" -eq "ARM64") {
            pnpm --filter @clawgoal/backend build win-arm64-native
          } else {
            pnpm --filter @clawgoal/backend build $target
          }

      - name: Upload Server Artifact (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: clawgoal-server-${{ matrix.target }}
          path: code/packages/backend/dist/${{ matrix.bin }}

      - name: Upload Server Artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: clawgoal-server-${{ matrix.target }}
          path: code/packages/backend/dist/${{ matrix.bin }}

  # ── Desktop app (Electron) ───────────────────────────────────────────────────
  build-app:
    name: Build App (${{ matrix.name }})
    needs: [build-server]
    if: vars.BUILD_CLIENT_ENABLE != 'false'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            arch: x64
            server_target: linux-x64
            server_bin: clawgoal-server-linux-amd64
          - name: linux-arm64
            os: ubuntu-latest
            arch: arm64
            server_target: linux-arm64
            server_bin: clawgoal-server-linux-arm64
          - name: mac-x64
            os: macos-latest
            arch: x64
            server_target: mac-x64
            server_bin: clawgoal-server-mac-x64
          - name: mac-arm64
            os: macos-latest
            arch: arm64
            server_target: mac-arm64
            server_bin: clawgoal-server-mac-arm64
          - name: win-x64
            os: windows-latest
            arch: x64
            server_target: win-x64
            server_bin: clawgoal-server-win-x64.exe
          - name: win-arm64
            os: windows-11-arm
            arch: arm64
            server_target: win-arm64
            server_bin: clawgoal-server-win-arm64.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Clone Pro Repo (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        env:
          GIT_USER: ${{ secrets.GIT_USER }}
          GIT_PASS: ${{ secrets.GIT_PASS }}
          GIT_HOST: ${{ secrets.GIT_HOST }}
          GIT_REPO_BASE: ${{ secrets.GIT_REPO_BASE }}
        run: |
          git clone -b main "https://${GIT_USER}:${GIT_PASS}@${GIT_HOST}/${GIT_REPO_BASE}/clawgoal-pro.git" code

      - name: Clone Pro Repo (Windows)
        if: runner.os == 'Windows'
        env:
          GIT_USER: ${{ secrets.GIT_USER }}
          GIT_PASS: ${{ secrets.GIT_PASS }}
          GIT_HOST: ${{ secrets.GIT_HOST }}
          GIT_REPO_BASE: ${{ secrets.GIT_REPO_BASE }}
        shell: pwsh
        run: |
          git clone -b main "https://${env:GIT_USER}:${env:GIT_PASS}@${env:GIT_HOST}/${env:GIT_REPO_BASE}/clawgoal-pro.git" code

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libfuse2 fuse

      - name: Cert Prepare (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.CORP_MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.CORP_MACOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "ERROR: CORP_MACOS_CERTIFICATE secret is not set. macOS signing requires a valid certificate."
            exit 1
          fi
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security unlock-keychain -p "" build.keychain
          # Get cert label and update partition list for electron-builder access
          CERT_LABEL=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | sed -n 's/.*"\(.*\)".*/\1/p')
          security set-key-partition-list -S apple-tool:,apple: -s -k "" -l "${CERT_LABEL}" -t private build.keychain
          # Export and trust
          security export -k build.keychain -t certs -f x509 -p -o certificate.cer
          sudo security add-trusted-cert -d -r trustRoot -k /Library/Keychains/System.keychain certificate.cer

      - name: Install Dependencies (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        working-directory: code
        run: pnpm install --no-frozen-lockfile

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        working-directory: code
        shell: pwsh
        run: pnpm install --no-frozen-lockfile

      - name: Set BUILD_ID for App (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: |
          BUILD_ID="${{ matrix.server_target }}"
          case "$BUILD_ID" in
            linux-x64) BUILD_ID="linux-amd64" ;;
            mac-x64)   BUILD_ID="darwin-amd64" ;;
            mac-arm64) BUILD_ID="darwin-arm64" ;;
          esac
          BUILD_ID="${BUILD_ID}-$(date +%Y%m%d-%H%M%S)-${RANDOM}"
          echo "BUILD_ID=${BUILD_ID}" >> $GITHUB_ENV

      - name: Set BUILD_ID for App (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = "${{ matrix.server_target }}"
          $plat = switch ($target) {
            "win-x64"   { "windows-amd64" }
            "win-arm64" { "windows-arm64" }
          }
          $ts = Get-Date -Format 'yyyyMMdd-HHmmss'
          $rn = Get-Random -Minimum 10000 -Maximum 99999
          "BUILD_ID=${plat}-${ts}-${rn}" >> $env:GITHUB_ENV

      - name: Download Server Binary
        uses: actions/download-artifact@v6
        with:
          name: clawgoal-server-${{ matrix.server_target }}
          path: code/packages/backend/dist/

      - name: 'Debug: list downloaded server binary'
        if: runner.os != 'Windows'
        working-directory: code
        run: ls -lh packages/backend/dist/clawgoal-server-* || echo "No server binary found"

      - name: 'Build & Package Electron App'
        working-directory: code/client
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ELECTRON_MIRROR: ${{ secrets.ELECTRON_MIRROR }}
        run: node scripts/build.cjs --full --arch ${{ matrix.arch }} "../packages/backend/dist/${{ matrix.server_bin }}"

      - name: 'Debug: list build output'
        if: runner.os != 'Windows'
        working-directory: code/client
        run: |
          echo "=== build/ contents ==="
          ls -lh build/ 2>/dev/null || echo "(empty)"
          echo "=== AppImage ==="
          ls -lh build/*.AppImage 2>/dev/null || echo "(none)"
          echo "=== deb ==="
          ls -lh build/*.deb 2>/dev/null || echo "(none)"
          echo "=== dmg ==="
          ls -lh build/*.dmg 2>/dev/null || echo "(none)"
          echo "=== exe ==="
          ls -lh build/*.exe 2>/dev/null || echo "(none)"

      - name: Upload App Artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: clawgoal-app-${{ matrix.name }}
          path: |
            code/client/build/*.AppImage
            code/client/build/*.deb

      - name: Upload App Artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: clawgoal-app-${{ matrix.name }}
          path: code/client/build/*.dmg

      - name: Upload App Artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: clawgoal-app-${{ matrix.name }}
          path: code/client/build/*.exe

  # ── Release ────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-server, build-app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download All Artifacts
        uses: actions/download-artifact@v6
        with:
          path: _artifacts
          merge-multiple: false

      - name: Create Release and Upload Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Create draft release (idempotent)
          gh release create "$TAG" \
            --title "$TAG" \
            --draft \
            --prerelease=false \
            --notes "" \
            2>/dev/null || true
          # Upload all server & app binaries
          find _artifacts/ -type f | while read f; do
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" --clobber
          done

  # ── Notify ────────────────────────────────────────────────────────────────────
  notify:
    name: Notify
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Notify Webhook
        run: |
          NAME="${{ github.event.repository.name }}"
          TYPE=$(echo "${{ github.workflow }}" | tr '[:upper:]' '[:lower:]')
          VERSION=$(node -p "require('./package.json').version")
          curl -X POST "${{ secrets.HOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"event\":\"${NAME}\",\"param\":{\"name\":\"${NAME}\",\"type\":\"${TYPE}\",\"version\":\"${VERSION}\"},\"data\":{\"name\":\"${NAME}\",\"type\":\"${TYPE}\",\"version\":\"${VERSION}\"}}"
